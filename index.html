<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">

    <!-- Responsive -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- SEO -->
    <meta name="description" content="Improve your front-end skills by building projects. Scan the QR code to visit Frontend Mentor and practice real-world coding challenges.">
    <meta name="keywords" content="Frontend Mentor, QR Code, Frontend Project, HTML CSS, Web Development">
    <meta name="author" content="Charlie CréaTech">

    <title>QR Code Component | Frontend Mentor</title>

  <body>

          <img 
            src="./images/image-qr-code.png"

        Coded with 💓💓💓 by

          Charlie CréaTech
        </a>.
      </p>
